name: Docker Image CI/CD

on:
  push:
    tags:
      - 'v*'  # 匹配 v1.0, v2.1.0 等版本标签
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # 推送镜像到 GHCR 的权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'arm64,amd64'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 如果是 tag 推送，使用 tag 名称
            type=ref,event=tag
            # 如果是手动触发，使用输入的 tag
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            # 始终推送 latest 标签
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}

      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "🎉 Docker image published for tag: ${{ github.ref_name }}"
          echo ""
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          echo ""
          echo "Pull command:"
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          echo ""
          echo "Run command:"
          echo "docker run -d -p 5000:5000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            DEPLOYMENT.md
            README.md
          generate_release_notes: true
          body: |
            ## 🐳 Docker 镜像

            **镜像地址**: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

            ### 快速开始

            ```bash
            # 拉取镜像
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

            # 运行容器
            docker run -d \
              --name myoss \
              -p 5000:5000 \
              -e OSS_ACCESS_KEY_ID=your_key_id \
              -e OSS_ACCESS_KEY_SECRET=your_key_secret \
              -e OSS_ENDPOINT=oss-cn-hangzhou.aliyuncs.com \
              -e OSS_BUCKET_NAME=your_bucket \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ### 使用 Docker Compose

            ```bash
            docker-compose up -d
            ```

            ## 📝 更新内容

            请查看 [CHANGELOG](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) 获取详细信息。

            ## 📦 镜像信息

            - **构建时间**: ${{ github.event.head_commit.timestamp }}
            - **提交哈希**: ${{ github.sha }}
            - **版本**: ${{ github.ref_name }}
            - **平台**: linux/amd64, linux/arm64

  deploy-notification:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Notification
        run: |
          echo "✅ Docker image successfully built and published!"
          echo ""
          echo "📦 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          echo "🔗 GitHub Packages: https://github.com/${{ github.repository }}/pkgs/container/myoss.wodedata.com"
          echo ""
          echo "🚀 Next steps:"
          echo "1. Pull the image: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          echo "2. Configure environment variables"
          echo "3. Run the container"
          echo "4. Access the application at http://localhost:5000"
